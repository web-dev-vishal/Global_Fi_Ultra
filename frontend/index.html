<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Global-Fi Ultra — High-performance financial data dashboard with real-time market data, AI insights, and portfolio management." />
    <meta name="theme-color" content="#0f172a" />
    <title>Global-Fi Ultra</title>
    <script>
      // Apply dark mode before render to prevent flash
      (function() {
        try {
          var theme = localStorage.getItem('gfu_theme') || 'dark';
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
