<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Global-Fi Ultra — Real-time financial data, AI insights, and portfolio management." />
    <meta name="theme-color" content="#f5f6f8" />
    <title>Global-Fi Ultra</title>
    <script>
      // Light is default. Apply .dark class only when dark mode is selected.
      (function () {
        try {
          var t = localStorage.getItem('gfu_theme') || 'light';
          var isDark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          // stay light (default)
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
